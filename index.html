ur whole heart. Lucky me.",emoji:"❤️"},{id:"love-reason-011",category:"love-reason",title:"Your messy hair",message:"I love your hair when it's a complete mess. Especially then, honestly.",emoji:"❤️"},{id:"love-reason-012",category:"love-reason",title:"Your stubbornness",message:"I love how stubborn you get about things you believe in. Don't ever lose that.",emoji:"❤️"},{id:"love-reason-013",category:"love-reason",title:"Your silly side",message:"I love that you're a little weird in exactly the same ways I am.",emoji:"❤️"},{id:"love-reason-014",category:"love-reason",title:"Your hands",message:"I love your hands — every time they reach for mine, my whole day resets.",emoji:"❤️"},{id:"love-reason-015",category:"love-reason",title:"Your dreams",message:"I love listening to you talk about your dreams. I believe in every single one.",emoji:"❤️"},{id:"love-reason-016",category:"love-reason",title:"Your patience",message:"I love how patient you are with me, even when I definitely don't deserve it.",emoji:"❤️"},{id:"love-reason-017",category:"love-reason",title:"Your honesty",message:"I love that you tell me the truth, gently, even when it's hard.",emoji:"❤️"},{id:"love-reason-018",category:"love-reason",title:"How you try",message:"I love how hard you try at everything. Esha, the effort you give never goes unnoticed.",emoji:"❤️"},{id:"love-reason-019",category:"love-reason",title:"Your sleepy voice",message:"I love your half-asleep voice when you mumble that you missed me.",emoji:"❤️"},{id:"love-reason-020",category:"love-reason",title:"Your heart",message:"I love that your heart is somehow both the softest and the strongest one I've ever met.",emoji:"❤️"},{id:"love-reason-021",category:"love-reason",title:"You, simply",message:"I love you for no reason and every reason at the same time.",emoji:"❤️"},{id:"love-reason-022",category:"love-reason",title:"Your comfort",message:"I love that being around you feels like coming home after a long, long day.",emoji:"❤️"},{id:"love-reason-023",category:"love-reason",title:"Your excitement",message:"I love how excited you get about small things — it makes the world feel bigger.",emoji:"❤️"},{id:"love-reason-024",category:"love-reason",title:"Your smile at me",message:"I love the specific smile you save just for me. I'd recognise it anywhere.",emoji:"❤️"},{id:"love-reason-025",category:"love-reason",title:"Your mind",message:"I love the way you think. Esha, your brain is genuinely my favourite place to visit.",emoji:"❤️"},{id:"love-reason-026",category:"love-reason",title:"Your warmth",message:"I love how warm you are — people feel it the moment they meet you.",emoji:"❤️"},{id:"love-reason-027",category:"love-reason",title:"Just because",message:"I love you on your loud days, your quiet days, and every ordinary day in between.",emoji:"❤️"},{id:"love-reason-028",category:"love-reason",title:"All of it",message:"I love you. Not the idea of you — the real, whole, complicated, wonderful you.",emoji:"❤️"},{id:"compliment-001",category:"compliment",title:"",message:"You are my favourite notification.",emoji:"📱"},{id:"compliment-002",category:"compliment",title:"",message:"You're the human equivalent of a warm cup of tea on a cold day.",emoji:"🍵"},{id:"compliment-003",category:"compliment",title:"",message:"You make ordinary moments feel like scenes from a really good film.",emoji:"🎞️"},{id:"compliment-004",category:"compliment",title:"",message:"If cuteness were a crime, Esha, you'd be in serious trouble.",emoji:"🚨"},{id:"compliment-005",category:"compliment",title:"",message:"You have the kind of smile people write songs about.",emoji:"🎶"},{id:"compliment-006",category:"compliment",title:"",message:"You're proof that something can be soft and strong at the same time.",emoji:"🌷"},{id:"compliment-007",category:"compliment",title:"",message:"Talking to you is my favourite part of literally any day.",emoji:"💬"},{id:"compliment-008",category:"compliment",title:"",message:"You're so thoughtful it should honestly be studied.",emoji:"🔬"},{id:"compliment-009",category:"compliment",title:"",message:"Your brain and your heart are both ridiculously beautiful.",emoji:"🧠"},{id:"compliment-010",category:"compliment",title:"",message:"You light up a room just by walking into it. It's a little unfair.",emoji:"💡"},{id:"compliment-011",category:"compliment",title:"",message:"You're cuter than every animal video combined, and that's saying a lot.",emoji:"🐶"},{id:"compliment-012",category:"compliment",title:"",message:"Being around you feels like the first warm day after a long winter.",emoji:"🌤️"},{id:"compliment-013",category:"compliment",title:"",message:"You're my favourite hello and my hardest goodbye.",emoji:"👋"},{id:"compliment-014",category:"compliment",title:"",message:"You make 'good' days into 'great' ones without even trying.",emoji:"⭐"},{id:"compliment-015",category:"compliment",title:"",message:"You're the plot twist I'm endlessly grateful for.",emoji:"📖"},{id:"compliment-016",category:"compliment",title:"",message:"You have impeccable taste. Exhibit A: you put up with me.",emoji:"😌"},{id:"compliment-017",category:"compliment",title:"",message:"Even your typos are adorable. I don't make the rules.",emoji:"⌨️"},{id:"compliment-018",category:"compliment",title:"",message:"You're a whole vibe and the vibe is 'home'.",emoji:"🏡"},{id:"compliment-019",category:"compliment",title:"",message:"Somewhere a thesaurus is missing the words to describe how lovely you are.",emoji:"📚"},{id:"compliment-020",category:"compliment",title:"",message:"You're the best decision I keep getting to make.",emoji:"✅"},{id:"compliment-021",category:"compliment",title:"",message:"You could wear a paper bag and still be the most beautiful person there.",emoji:"🛍️"},{id:"compliment-022",category:"compliment",title:"",message:"Your kindness is the kind that quietly changes people.",emoji:"🤍"},{id:"compliment-023",category:"compliment",title:"",message:"Esha, you are a 10/10 and the scale was clearly built too small.",emoji:"💯"},{id:"compliment-024",category:"compliment",title:"",message:"You're the reason 'butterflies in your stomach' stopped being just a phrase.",emoji:"🦋"},{id:"compliment-025",category:"compliment",title:"",message:"You make me want to be the kind of person you deserve.",emoji:"🌟"},{id:"compliment-026",category:"compliment",title:"",message:"You're effortlessly the most interesting person in any room.",emoji:"✨"},{id:"compliment-027",category:"compliment",title:"",message:"Your existence improves my entire week. Every week.",emoji:"📆"},{id:"compliment-028",category:"compliment",title:"",message:"You're my favourite person to do absolutely nothing with.",emoji:"🛋️"},{id:"joke-001",category:"joke",title:"",message:"Are you a magician? Because whenever I look at you, everyone else disappears.",emoji:"🪄"},{id:"joke-002",category:"joke",title:"",message:"I told my heart to stop fluttering around you. It filed a formal complaint.",emoji:"💌"},{id:"joke-003",category:"joke",title:"",message:`What did one jar say to the other? "I'm so full of feelings."`,emoji:"🫙"},{id:"joke-004",category:"joke",title:"",message:"Why don't scientists trust atoms? They make up everything — kind of like my excuses to text you.",emoji:"⚛️"},{id:"joke-005",category:"joke",title:"",message:"You must be tired, because you've been running through my notifications all day.",emoji:"🏃"},{id:"joke-006",category:"joke",title:"",message:"I'm not saying you're a snack, but I'd definitely skip dinner for you.",emoji:"🍪"},{id:"joke-007",category:"joke",title:"",message:"What do you call a very small valentine? A valen-tiny.",emoji:"💕"},{id:"joke-008",category:"joke",title:"",message:"I asked the Wi-Fi if it felt the connection too. It said 'strong signal.'",emoji:"📶"},{id:"joke-009",category:"joke",title:"",message:"Why did the coffee file a police report? It got mugged. Anyway, good morning.",emoji:"☕"},{id:"joke-010",category:"joke",title:"",message:"Are you French? Because Eiffel for you. I'm so sorry. No I'm not.",emoji:"🗼"},{id:"joke-011",category:"joke",title:"",message:"My phone autocorrects 'hi' to 'hi I miss you' now. Very embarrassing.",emoji:"📲"},{id:"joke-012",category:"joke",title:"",message:"I'm reading a book on anti-gravity. It's impossible to put down — like you.",emoji:"📕"},{id:"joke-013",category:"joke",title:"",message:"What's a skeleton's least favourite room? The living room. Spooky and single.",emoji:"💀"},{id:"joke-014",category:"joke",title:"",message:"I'd say a chemistry pun, but I know I wouldn't get a reaction. Unlike when I see you.",emoji:"🧪"},{id:"joke-015",category:"joke",title:"",message:"Why did the scarecrow win an award? He was outstanding in his field. Like your selfies.",emoji:"🌾"},{id:"joke-016",category:"joke",title:"",message:"Knock knock. Who's there? Olive. Olive who? Olive you and I'm not even sorry.",emoji:"🫒"},{id:"joke-017",category:"joke",title:"",message:"I named my Wi-Fi 'It Hurts When IP'. The router has not recovered.",emoji:"🛜"},{id:"joke-018",category:"joke",title:"",message:"Why don't eggs tell jokes? They'd crack each other up — kind of like us at 2am.",emoji:"🥚"},{id:"joke-019",category:"joke",title:"",message:"You're like a dictionary — you add meaning to my life. Also occasionally confusing.",emoji:"📖"},{id:"joke-020",category:"joke",title:"",message:"I tried to catch fog yesterday. Mist. Just like I miss you. Devastating.",emoji:"🌫️"},{id:"joke-021",category:"joke",title:"",message:"What do you call cheese that isn't yours? Nacho cheese. What do I call you? Mine, hopefully.",emoji:"🧀"},{id:"joke-022",category:"joke",title:"",message:"My bed and I are perfect together, but you're invited to ruin that.",emoji:"🛏️"},{id:"joke-023",category:"joke",title:"",message:"Why did the bicycle fall over? It was two-tired. Same. Come nap with me.",emoji:"🚲"},{id:"joke-024",category:"joke",title:"",message:"I'm on a seafood diet. I see food and I think about sharing it with you. Growth.",emoji:"🦐"},{id:"joke-025",category:"joke",title:"",message:"They say nothing rhymes with 'orange'. They've never tried as hard as I try to make you laugh.",emoji:"🍊"},{id:"joke-026",category:"joke",title:"",message:"I have a joke about procrastination. I'll tell you now, actually, because I miss you.",emoji:"⏰"},{id:"joke-027",category:"joke",title:"",message:"Why did the math book look sad? Too many problems. Come add to my life instead.",emoji:"➗"},{id:"joke-028",category:"joke",title:"",message:"I'm not great at puns. But you're a-PEEL-ing enough to make me keep trying.",emoji:"🍌"},{id:"animal-001",category:"animal",title:"Otters",message:"Otters hold hands while they sleep so they don't drift apart. Reaching for your hand now.",emoji:"🦦"},{id:"animal-002",category:"animal",title:"Penguins",message:"A penguin will search the whole beach for the perfect pebble to give the one they love. You're my pebble.",emoji:"🐧"},{id:"animal-003",category:"animal",title:"Cats",message:"A cat's purr can actually help heal bones. You've been healing me this whole time, clearly.",emoji:"🐱"},{id:"animal-004",category:"animal",title:"Puppies",message:"Imagine a tiny puppy doing its first clumsy zoomie. That's the level of joy you give me.",emoji:"🐶"},{id:"animal-005",category:"animal",title:"Cows",message:"Cows have best friends and get stressed when they're apart. Relatable. Don't go too far.",emoji:"🐮"},{id:"animal-006",category:"animal",title:"Bunnies",message:"When rabbits are really happy they do a little twist in the air called a 'binky'. You make me binky.",emoji:"🐰"},{id:"animal-007",category:"animal",title:"Foxes",message:"Foxes make over 40 different sounds to talk to each other. I'd learn all of them to talk to you.",emoji:"🦊"},{id:"animal-008",category:"animal",title:"Elephants",message:"Elephants comfort each other by gently touching trunks when one is sad. Consider this a trunk-touch.",emoji:"🐘"},{id:"animal-009",category:"animal",title:"Ducklings",message:"Ducklings imprint on the first kind face they see. I'd happily be yours forever.",emoji:"🦆"},{id:"animal-010",category:"animal",title:"Seahorses",message:"Seahorse couples greet each other with a little dance every single morning. Let's adopt that.",emoji:"🐴"},{id:"animal-011",category:"animal",title:"Red pandas",message:"A red panda stretches up tall to look bigger when surprised. Adorable and brave. Like you.",emoji:"🐼"},{id:"animal-012",category:"animal",title:"Dogs",message:"Dogs tilt their heads when they're trying to understand you better. I do that with you too.",emoji:"🐕"},{id:"animal-013",category:"animal",title:"Hedgehogs",message:"A baby hedgehog is called a 'hoglet'. That's it. That's the message. You're welcome.",emoji:"🦔"},{id:"animal-014",category:"animal",title:"Dolphins",message:"Dolphins give each other names and call out for the ones they miss. I'd call for you across any ocean.",emoji:"🐬"},{id:"animal-015",category:"animal",title:"Kittens",message:"A sleepy kitten kneading a soft blanket — that's how content I feel next to you.",emoji:"🐈"},{id:"animal-016",category:"animal",title:"Owls",message:"A group of owls is called a 'parliament'. Very serious birds. We'd be the silly ones in the back.",emoji:"🦉"},{id:"animal-017",category:"animal",title:"Sloths",message:"Sloths only come down from their tree once a week. I'd come down every day if you were waiting.",emoji:"🦥"},{id:"animal-018",category:"animal",title:"Whales",message:"Whales sing songs that travel for miles. Mine would just be your name, over and over.",emoji:"🐋"},{id:"animal-019",category:"animal",title:"Pandas",message:"Baby pandas sneeze so hard they startle themselves. Please picture that and smile.",emoji:"🐼"},{id:"animal-020",category:"animal",title:"Bees",message:"Bees dance to tell each other where the good stuff is. I'd dance the whole way to you.",emoji:"🐝"},{id:"animal-021",category:"animal",title:"Goats",message:"Baby goats hop sideways out of pure happiness. Consider this your permission to hop today.",emoji:"🐐"},{id:"animal-022",category:"animal",title:"Cats again",message:"A cat slow-blinking at you is basically a kitty kiss. Slow-blinking at you right now.",emoji:"😺"},{id:"animal-023",category:"animal",title:"Capybaras",message:"Capybaras get along with literally every animal. The world's chillest creature. Goals for us.",emoji:"🦫"},{id:"animal-024",category:"animal",title:"Swans",message:"Swans form heart shapes with their necks and often mate for life. Subtle, but I see them.",emoji:"🦢"},{id:"animal-025",category:"animal",title:"Quokkas",message:"Quokkas look like they're always smiling. So do you, in every photo I've saved.",emoji:"🦘"},{id:"animal-026",category:"animal",title:"Frogs",message:"Some frogs freeze solid in winter and hop away just fine in spring. We'll thaw out together.",emoji:"🐸"},{id:"animal-027",category:"animal",title:"Chicks",message:"A fluffy yellow chick falling asleep mid-step. That's my brain whenever you text me goodnight.",emoji:"🐥"},{id:"animal-028",category:"animal",title:"Bears",message:"Bear cubs wrestle to learn how to hug properly. I've clearly been practising for you.",emoji:"🐻"},{id:"song-001",category:"song",title:"Our frequency",message:"Somewhere there's a song that sounds exactly like how you make me feel. I hear it every time you smile.",emoji:"🎵"},{id:"song-002",category:"song",title:"First dance",message:"One day there'll be a song that's just 'ours'. I can't wait to hear it for the first time with you.",emoji:"🎵"},{id:"song-003",category:"song",title:"Slow song",message:"If we were in a film, this is where the soft song would start playing and I'd ask you to dance.",emoji:"🎵"},{id:"song-004",category:"song",title:"On repeat",message:"You're the chorus I never get tired of. I'd put you on repeat forever, Esha.",emoji:"🎵"},{id:"song-005",category:"song",title:"Car windows down",message:"Picture us, windows down, both shouting the wrong lyrics. That's the song I'd pick for today.",emoji:"🎵"},{id:"song-006",category:"song",title:"Hum to you",message:"There's a tune I hum without realising. Turns out it's just the rhythm of missing you.",emoji:"🎵"},{id:"song-007",category:"song",title:"Acoustic version",message:"You're the stripped-back, acoustic, no-autotune kind of beautiful. Real and warm and steady.",emoji:"🎵"},{id:"song-008",category:"song",title:"The bridge",message:"Every good song has that one part that gives you chills. With us, that part is just... all of it.",emoji:"🎵"},{id:"song-009",category:"song",title:"Lullaby",message:"If I could, I'd sing you something soft every night until your shoulders finally dropped.",emoji:"🎵"},{id:"song-010",category:"song",title:"Our playlist",message:"I'm secretly building a playlist of songs that remind me of you. It's getting dangerously long.",emoji:"🎵"},{id:"song-011",category:"song",title:"Dance in the kitchen",message:"Let's make a rule: any song that comes on while we're cooking, we have to dance to.",emoji:"🎵"},{id:"song-012",category:"song",title:"Volume up",message:"Some days call for a loud, happy song and your hand in mine. Today feels like one of those.",emoji:"🎵"},{id:"song-013",category:"song",title:"The outro",message:"Even when a song ends, the feeling stays a little. That's what you're like.",emoji:"🎵"},{id:"song-014",category:"song",title:"Stuck in my head",message:"You're stuck in my head like the best kind of song — the one I'm thrilled I can't shake.",emoji:"🎵"},{id:"song-015",category:"song",title:"Slow morning",message:"Imagine a lazy Sunday, soft music, no plans, just us. That's the soundtrack I want.",emoji:"🎵"},{id:"song-016",category:"song",title:"Harmony",message:"I don't know much about music, but I know we harmonise. Even our silences are in tune.",emoji:"🎵"},{id:"song-017",category:"song",title:"The build-up",message:"That moment in a song right before it all kicks in? That's the feeling I get when you walk in.",emoji:"🎵"},{id:"song-018",category:"song",title:"Encore",message:"If our story were a concert, I'd be the one shouting 'one more song' at the end, every time.",emoji:"🎵"},{id:"song-019",category:"song",title:"Soft static",message:"Even on the days everything feels like noise, you're the one clear note I can always find.",emoji:"🎵"},{id:"song-020",category:"song",title:"Your song",message:"If I wrote you a song, Esha, the whole first verse would just be the things you don't know I notice.",emoji:"🎵"},{id:"song-021",category:"song",title:"Road trip anthem",message:"Let's pick a road-trip anthem that's so embarrassing it becomes legendary. I have nominees.",emoji:"🎵"},{id:"song-022",category:"song",title:"Rainy day track",message:"Rainy days deserve a slow song, a warm drink, and you tucked under a blanket beside me.",emoji:"🎵"},{id:"song-023",category:"song",title:"The drop",message:"You're my favourite beat drop — the surprise that makes the whole thing worth the wait.",emoji:"🎵"},{id:"song-024",category:"song",title:"Whistle it",message:"I caught myself whistling on a grey morning. Then I realised: oh, I'm just thinking about you again.",emoji:"🎵"},{id:"song-025",category:"song",title:"Replay",message:"Some memories with you I replay like a favourite track, smiling at the exact same parts every time.",emoji:"🎵"},{id:"song-026",category:"song",title:"Two-step",message:"One day I'll teach you the silliest little two-step and we'll do it badly and laugh until it's good.",emoji:"🎵"},{id:"song-027",category:"song",title:"The quiet part",message:"My favourite part of any song is the quiet bit. My favourite part of any day is the quiet bit with you.",emoji:"🎵"},{id:"song-028",category:"song",title:"Last song of the night",message:"When the night's almost over, you're the last-song-of-the-set kind of person. The one that lingers.",emoji:"🎵"},{id:"movie-001",category:"movie",title:"Blanket fort",message:"Movie night idea: build an absurd blanket fort, agree on snacks, then argue about the film for an hour anyway.",emoji:"🎬"},{id:"movie-002",category:"movie",title:"The classic",message:"Let's watch the comfort film you've seen a hundred times. I want to watch you mouth along to the lines.",emoji:"🎬"},{id:"movie-003",category:"movie",title:"Scary movie",message:"Pick something a little scary so you have an excuse to grab my arm. I'll pretend I'm being brave for you.",emoji:"🎬"},{id:"movie-004",category:"movie",title:"Rom-com rule",message:"New rule: every rom-com we watch, we pause to decide which one of us is which character.",emoji:"🎬"},{id:"movie-005",category:"movie",title:"Two films, one nap",message:"The plan: start two movies, finish neither, fall asleep halfway through both. A perfect evening.",emoji:"🎬"},{id:"movie-006",category:"movie",title:"Subtitles on",message:"Subtitles on, lights off, phones across the room. Just us and a story for a couple of hours.",emoji:"🎬"},{id:"movie-007",category:"movie",title:"Your pick",message:"Tonight it's entirely your pick — even if it's the one I 'don't get'. I get you, that's enough.",emoji:"🎬"},{id:"movie-008",category:"movie",title:"Animated night",message:"Let's watch something animated and pretend it's for the plot and not because we both cry at them.",emoji:"🎬"},{id:"movie-009",category:"movie",title:"Double feature",message:"Double feature challenge: one you love, one I love. Loser controls snacks. Everyone wins, really.",emoji:"🎬"},{id:"movie-010",category:"movie",title:"The one you quote",message:"Show me the film you quote constantly so I can finally understand 60% of the things you say.",emoji:"🎬"},{id:"movie-011",category:"movie",title:"Slow burn",message:"Let's pick a slow, beautiful film and let it take its time. We're not in a hurry. We never are.",emoji:"🎬"},{id:"movie-012",category:"movie",title:"Bad on purpose",message:"Sometimes the best night is a gloriously terrible movie and us roasting it the whole way through.",emoji:"🎬"},{id:"movie-013",category:"movie",title:"Cosy documentary",message:"A calm documentary, your head on my shoulder, learning something neither of us needed to know.",emoji:"🎬"},{id:"movie-014",category:"movie",title:"Childhood favourite",message:"Show me the film you loved as a kid. I want to meet tiny Esha through her favourite story.",emoji:"🎬"},{id:"movie-015",category:"movie",title:"Midnight premiere",message:"Let's stay up for something at midnight just to feel a little reckless on a school night.",emoji:"🎬"},{id:"movie-016",category:"movie",title:"Comfort sequel",message:"Whole-series rewatch, in order, no skipping. I've cleared my schedule. I've cleared my heart.",emoji:"🎬"},{id:"movie-017",category:"movie",title:"One more episode",message:"It's never one more episode with you. It's 'one more' six times and then sunrise. Worth it.",emoji:"🎬"},{id:"movie-018",category:"movie",title:"Snack architecture",message:"Movie night is 40% film, 60% engineering the perfect snack setup. I take this very seriously.",emoji:"🎬"},{id:"movie-019",category:"movie",title:"Foreign film",message:"Let's watch something in a language we don't speak and feel very cultured and slightly confused.",emoji:"🎬"},{id:"movie-020",category:"movie",title:"The cry one",message:"Yes, let's watch the one that makes us both cry. I'll hold you for the whole third act.",emoji:"🎬"},{id:"movie-021",category:"movie",title:"Pajama premiere",message:"Dress code for tonight: softest pajamas you own. Red carpet is the couch. You're the main event.",emoji:"🎬"},{id:"movie-022",category:"movie",title:"Rewind that",message:"Let's rewind the best scene and watch it twice, just because we can and nobody's stopping us.",emoji:"🎬"},{id:"movie-023",category:"movie",title:"Feel-good only",message:"Rough week? Then it's a strict feel-good-only policy tonight. No sad endings allowed near you.",emoji:"🎬"},{id:"movie-024",category:"movie",title:"Director's cut",message:"I'd happily sit through the four-hour director's cut of anything if it meant four hours next to you.",emoji:"🎬"},{id:"movie-025",category:"movie",title:"Picnic on the floor",message:"Spread a blanket on the living room floor, lay out little snacks, and call it indoor stargazing.",emoji:"🎬"},{id:"movie-026",category:"movie",title:"The trailer trap",message:"We'll spend 45 minutes watching trailers, pick nothing, and have an amazing time doing it.",emoji:"🎬"},{id:"movie-027",category:"movie",title:"Quiet credits",message:"Let's be the people who sit through the credits, holding hands, not quite ready for it to end.",emoji:"🎬"},{id:"movie-028",category:"movie",title:"Marathon mode",message:"Pillows stacked, snacks rationed, alarms ignored. Marathon mode with you is my favourite sport.",emoji:"🎬"},{id:"memory-001",category:"memory",title:"The first time",message:"Remember the first time we really talked and suddenly hours had vanished? I knew something had shifted.",emoji:"📸"},{id:"memory-002",category:"memory",title:"That laugh",message:"Remember when you laughed so hard you couldn't breathe and I fell for you a little more right then?",emoji:"📸"},{id:"memory-003",category:"memory",title:"The long walk",message:"Remember that walk that was supposed to be ten minutes and turned into the whole evening?",emoji:"📸"},{id:"memory-004",category:"memory",title:"Caught in the rain",message:"Remember getting caught in the rain and choosing to walk slower instead of running? Best decision.",emoji:"📸"},{id:"memory-005",category:"memory",title:"Your text",message:"Remember the message you sent that I read about forty times? I still have it, Esha.",emoji:"📸"},{id:"memory-006",category:"memory",title:"2am talks",message:"Remember those 2am conversations about everything and nothing? I'd trade a lot of sleep for more of them.",emoji:"📸"},{id:"memory-007",category:"memory",title:"The inside joke",message:"Remember the exact moment our inside joke was born? Nobody else will ever get it. That's the point.",emoji:"📸"},{id:"memory-008",category:"memory",title:"Shared headphones",message:"Remember sharing one set of headphones, heads tilted together? Small thing. Enormous to me.",emoji:"📸"},{id:"memory-009",category:"memory",title:"The road trip",message:"Remember singing badly in the car with the windows down? Pure, dumb, perfect happiness.",emoji:"📸"},{id:"memory-010",category:"memory",title:"That meal",message:"Remember that meal we couldn't stop talking through until the place was basically closing?",emoji:"📸"},{id:"memory-011",category:"memory",title:"You, tired and happy",message:"Remember you, exhausted but grinning, telling me about your day? I could've listened all night.",emoji:"📸"},{id:"memory-012",category:"memory",title:"The photo",message:"Remember that candid photo where you didn't know I was looking? It's still my favourite one.",emoji:"📸"},{id:"memory-013",category:"memory",title:"First me too",message:"Remember the first time we said the same thing at the same time and just stared? Yeah. Me too.",emoji:"📸"},{id:"memory-014",category:"memory",title:"The quiet drive",message:"Remember the drive where neither of us spoke and it was the most comfortable silence in the world?",emoji:"📸"},{id:"memory-015",category:"memory",title:"Cooking chaos",message:"Remember trying to cook together and nearly burning everything? We'd do it all again tomorrow.",emoji:"📸"},{id:"memory-016",category:"memory",title:"The long hug",message:"Remember the hug that lasted a beat too long, in the best way, like neither of us wanted to let go?",emoji:"📸"},{id:"memory-017",category:"memory",title:"Stargazing attempt",message:"Remember trying to find constellations and failing completely? We invented better ones anyway.",emoji:"📸"},{id:"memory-018",category:"memory",title:"Your excited call",message:"Remember calling me the second something good happened, before anyone else? That meant everything.",emoji:"📸"},{id:"memory-019",category:"memory",title:"The little detour",message:"Remember taking the long way home just to make the night last a bit longer? Worth every extra minute.",emoji:"📸"},{id:"memory-020",category:"memory",title:"Matching moods",message:"Remember the day we were both in the exact same weird mood and it somehow became the best one?",emoji:"📸"},{id:"memory-021",category:"memory",title:"The first gift",message:"Remember the first little thing you gave me? I kept it. Of course I kept it.",emoji:"📸"},{id:"memory-022",category:"memory",title:"Laughing at nothing",message:"Remember laughing at something so stupid we couldn't even explain it to anyone? Those are the best.",emoji:"📸"},{id:"memory-023",category:"memory",title:"You fixing my day",message:"Remember the time you turned my whole terrible day around with one message? You do that a lot.",emoji:"📸"},{id:"memory-024",category:"memory",title:"The slow morning",message:"Remember a slow morning where leaving the moment felt impossible? I want a thousand more of those.",emoji:"📸"},{id:"memory-025",category:"memory",title:"Our song moment",message:"Remember when a song came on and we both went quiet and just... knew? I think about that a lot.",emoji:"📸"},{id:"memory-026",category:"memory",title:"The promise",message:"Remember the small promise we made that probably seemed tiny to you? I haven't forgotten it.",emoji:"📸"},{id:"memory-027",category:"memory",title:"You, brave",message:"Remember the day you did the scary thing and I got to watch you be brave? I was so proud, Esha.",emoji:"📸"},{id:"memory-028",category:"memory",title:"Just us",message:"Remember the ordinary evening that wasn't special on paper but felt like everything? Most of them do.",emoji:"📸"},{id:"love-letter-001",category:"love-letter",title:"A small letter",message:"Esha, on the days you feel like too much or not enough, I need you to know: you are exactly right to me. You always have been.",emoji:"💌"},{id:"love-letter-002",category:"love-letter",title:"For the hard days",message:"If today is heavy, put it down for a second. You don't have to carry all of it alone. I'm right here, and I'm not going anywhere.",emoji:"💌"},{id:"love-letter-003",category:"love-letter",title:"The truth",message:"I don't love you despite your messy parts. I love you including them. The whole map of you — that's the part I signed up for.",emoji:"💌"},{id:"love-letter-004",category:"love-letter",title:"What you are",message:"You are not a project to be fixed or a problem to be solved. You are a person to be loved, and Esha, I'm so glad I get to.",emoji:"💌"},{id:"love-letter-005",category:"love-letter",title:"Proud of you",message:"You survived another difficult day. I'm proud of you. Not for being perfect — for staying soft in a world that wasn't always kind back.",emoji:"💌"},{id:"love-letter-006",category:"love-letter",title:"My favourite",message:"Out of everyone, in every room, on every ordinary day — it's you. It's always quietly, completely you.",emoji:"💌"},{id:"love-letter-007",category:"love-letter",title:"A reminder",message:"You are allowed to take up space. You are allowed to rest. You are allowed to be loved on the days you can't love yourself. I'll cover those days.",emoji:"💌"},{id:"love-letter-008",category:"love-letter",title:"If I'm honest",message:"Sometimes I look at you when you're not looking and I can't believe my luck. That's the whole letter, really.",emoji:"💌"},{id:"love-letter-009",category:"love-letter",title:"When you doubt",message:"On the days you can't see how much you matter, borrow my eyes. From here, Esha, you are extraordinary, and you always have been.",emoji:"💌"},{id:"love-letter-010",category:"love-letter",title:"Steady",message:"I'm not going anywhere. Not when it's hard, not when you're quiet, not when you think you've shown me too much. Steady. That's my promise.",emoji:"💌"},{id:"love-letter-011",category:"love-letter",title:"You're enough",message:"You don't have to earn the love. It's not a reward for being okay. You have it on the bad days too. Especially then.",emoji:"💌"},{id:"love-letter-012",category:"love-letter",title:"Soft place",message:"If the world has been loud and sharp today, let me be the soft place. Rest your head. I've got the rest.",emoji:"💌"},{id:"love-letter-013",category:"love-letter",title:"Thank you",message:"Thank you for letting me see the real you — the unfiltered, off-duty, no-performance you. That trust is the best gift I've ever been given.",emoji:"💌"},{id:"love-letter-014",category:"love-letter",title:"Little and big",message:"I love you in the little ways — the texts, the snacks, the silly faces — and the big ways I don't always know how to say out loud.",emoji:"💌"},{id:"love-letter-015",category:"love-letter",title:"Your pace",message:"We can go at your pace. There's no clock here, no test, no version of you that's running out of time with me. Take all the time you need.",emoji:"💌"},{id:"love-letter-016",category:"love-letter",title:"On bad brain days",message:"When your brain is being unkind to you, remember it's the noise, not the truth. The truth is: you're loved, you're wanted, you're here. That's plenty.",emoji:"💌"},{id:"love-letter-017",category:"love-letter",title:"A quiet vow",message:"I promise to keep choosing you — not just once, dramatically, but daily, quietly, in all the small unglamorous ways that actually matter.",emoji:"💌"},{id:"love-letter-018",category:"love-letter",title:"You make sense",message:"With you, things just make more sense. The hard stuff feels lighter and the good stuff feels brighter. That's not nothing. That's everything.",emoji:"💌"},{id:"love-letter-019",category:"love-letter",title:"My calm",message:"In a noisy year, you've been the calm. Thank you for being the place my mind goes when it needs somewhere safe to land.",emoji:"💌"},{id:"love-letter-020",category:"love-letter",title:"Held",message:"Whatever you're feeling right now is allowed. You don't have to tidy it up for me. Just let yourself be held, Esha. I've got you.",emoji:"💌"},{id:"love-letter-021",category:"love-letter",title:"Worth it",message:"Every late reply you apologise for, every messy feeling, every 'sorry I'm a lot' — none of it scares me off. You're worth the whole of it.",emoji:"💌"},{id:"love-letter-022",category:"love-letter",title:"Coming home",message:"Loving you feels like coming home to a place I didn't know I was homesick for. I'm so glad I found the door.",emoji:"💌"},{id:"love-letter-023",category:"love-letter",title:"Still here",message:"Read this whenever you need it: I'm still here. Still yours. Still completely, unreasonably glad it's you.",emoji:"💌"},{id:"love-letter-024",category:"love-letter",title:"The good kind",message:"You are the good kind of overwhelming — like a sunrise that's almost too much, but you'd never look away.",emoji:"💌"},{id:"love-letter-025",category:"love-letter",title:"For later",message:"Save this one for a 3am when everything feels too big. Breathe. You are loved beyond what your tired brain can hold right now. Goodnight, my heart.",emoji:"💌"},{id:"love-letter-026",category:"love-letter",title:"No conditions",message:"There's no version of this where you have to be impressive to be loved. You just have to be you. That's the only requirement, Esha, and you meet it perfectly.",emoji:"💌"},{id:"love-letter-027",category:"love-letter",title:"My person",message:"People search their whole lives for a person who feels like 'theirs'. I found mine early. It's you. It was always going to be you.",emoji:"💌"},{id:"love-letter-028",category:"love-letter",title:"The last line",message:"If you only read one line today, read this one: you are deeply, genuinely, unconditionally loved — exactly as you are, right now, no edits required.",emoji:"💌"},{id:"challenge-001",category:"challenge",title:"Stretch",message:"Tiny challenge: stand up and stretch as tall as you can for ten whole seconds. Yes, right now.",emoji:"🙆"},{id:"challenge-002",category:"challenge",title:"Big breath",message:"Tiny challenge: take one slow breath in for four counts, hold, and let it out even slower.",emoji:"🌬️"},{id:"challenge-003",category:"challenge",title:"Hydrate",message:"Tiny challenge: drink a little water for me. Future-you will be grateful. ❤️",emoji:"💧"},{id:"challenge-004",category:"challenge",title:"Smile dare",message:"Tiny challenge: think of the last thing that made you laugh and let yourself smile about it again.",emoji:"😊"},{id:"challenge-005",category:"challenge",title:"Text someone",message:"Tiny challenge: send one person a message telling them you appreciate them. Watch what it does.",emoji:"💌"},{id:"challenge-006",category:"challenge",title:"Tidy one thing",message:"Tiny challenge: put away exactly one thing near you. Not the whole room. Just one. That's a win.",emoji:"🧺"},{id:"challenge-007",category:"challenge",title:"Look up",message:"Tiny challenge: look out the nearest window for thirty seconds. The world's still turning. So are you.",emoji:"🪟"},{id:"challenge-008",category:"challenge",title:"Shoulders down",message:"Tiny challenge: drop your shoulders away from your ears. They've been up there too long, haven't they?",emoji:"💆"},{id:"challenge-009",category:"challenge",title:"Tiny win",message:"Tiny challenge: do the smallest version of the thing you've been avoiding. Two minutes counts.",emoji:"🐣"},{id:"challenge-010",category:"challenge",title:"Favourite song",message:"Tiny challenge: play your favourite song and do literally nothing else until it ends.",emoji:"🎧"},{id:"challenge-011",category:"challenge",title:"Hand on heart",message:"Tiny challenge: put a hand on your chest and feel it rise and fall three times. You're doing great.",emoji:"🫶"},{id:"challenge-012",category:"challenge",title:"Step outside",message:"Tiny challenge: step outside or open a window and take one real, deep breath of fresh air.",emoji:"🌿"},{id:"challenge-013",category:"challenge",title:"Unclench",message:"Tiny challenge: unclench your jaw. Yep. I knew it. Better already.",emoji:"😌"},{id:"challenge-014",category:"challenge",title:"Compliment you",message:"Tiny challenge: say one kind thing about yourself out loud. Out loud, Esha. I'll wait.",emoji:"🌟"},{id:"challenge-015",category:"challenge",title:"Reach high",message:"Tiny challenge: reach both arms up like you're trying to grab the ceiling, then let them flop.",emoji:"🙌"},{id:"challenge-016",category:"challenge",title:"Snack break",message:"Tiny challenge: go get a little snack. This is your sign. Nourish the genius.",emoji:"🍎"},{id:"challenge-017",category:"challenge",title:"Two minutes",message:"Tiny challenge: set a timer for two minutes and just rest your eyes. Permission granted.",emoji:"⏲️"},{id:"challenge-018",category:"challenge",title:"Send a meme",message:"Tiny challenge: send me (or anyone) the funniest thing you've seen today. Spread the chaos.",emoji:"🤣"},{id:"challenge-019",category:"challenge",title:"Posture check",message:"Tiny challenge: sit up a little straighter. Crown on. You're royalty around here.",emoji:"👑"},{id:"challenge-020",category:"challenge",title:"Name three good things",message:"Tiny challenge: name three small good things about today. They count even if they're tiny.",emoji:"✨"},{id:"challenge-021",category:"challenge",title:"Cold water",message:"Tiny challenge: splash a little cool water on your face or wrists. Instant tiny reset.",emoji:"💦"},{id:"challenge-022",category:"challenge",title:"Wiggle",message:"Tiny challenge: do a ridiculous little wiggle dance. No one's watching. Or let them watch.",emoji:"🕺"},{id:"challenge-023",category:"challenge",title:"One small step",message:"Tiny challenge: pick the next tiniest step, not the whole staircase. Then take just that one.",emoji:"👟"},{id:"challenge-024",category:"challenge",title:"Soft thing",message:"Tiny challenge: go touch something soft — a blanket, a hoodie, a pet. Comfort is productive too.",emoji:"🧸"},{id:"challenge-025",category:"challenge",title:"Look back",message:"Tiny challenge: remember something you survived that once felt impossible. See? You're tougher than today.",emoji:"🛡️"},{id:"challenge-026",category:"challenge",title:"Tea or coffee",message:"Tiny challenge: make yourself a warm drink and hold it with both hands for a minute. Cosy mandatory.",emoji:"☕"},{id:"challenge-027",category:"challenge",title:"Forgive a little",message:"Tiny challenge: forgive yourself for one small thing from today. You were doing your best. You were.",emoji:"🤍"},{id:"challenge-028",category:"challenge",title:"You did it",message:"Tiny challenge: notice that you opened this jar instead of giving up on today. That already counts.",emoji:"🎉"},{id:"self-care-001",category:"self-care",title:"",message:"Drink a little water for me. ❤️ Your body's been carrying you all day.",emoji:"💧"},{id:"self-care-002",category:"self-care",title:"",message:"Have you eaten something real today? This is your gentle nudge to go fuel up.",emoji:"🍽️"},{id:"self-care-003",category:"self-care",title:"",message:"Unclench your jaw, drop your shoulders, and take one slow breath. There. Better.",emoji:"😮‍💨"},{id:"self-care-004",category:"self-care",title:"",message:"Rest isn't a reward you have to earn. You're allowed to stop now.",emoji:"🛌"},{id:"self-care-005",category:"self-care",title:"",message:"Your worth is not measured by how productive you were today. Not even a little.",emoji:"🌸"},{id:"self-care-006",category:"self-care",title:"",message:"If you've been holding it together for everyone else, this is permission to fall apart safely.",emoji:"🫧"},{id:"self-care-007",category:"self-care",title:"",message:"Take your meds / vitamins if you haven't. Tiny act, big love for yourself.",emoji:"💊"},{id:"self-care-008",category:"self-care",title:"",message:"You don't have to reply to everything right now. The world can hold for a minute. So can you.",emoji:"📵"},{id:"self-care-009",category:"self-care",title:"",message:"Put something cosy on. Warm socks, a soft hoodie. Treat yourself like someone you love.",emoji:"🧦"},{id:"self-care-010",category:"self-care",title:"",message:"It's okay to do the bare minimum today. Surviving a hard day is an achievement, not a failure.",emoji:"🤍"},{id:"self-care-011",category:"self-care",title:"",message:"Stretch your body the way a cat does when it wakes up. Slow, full, unbothered.",emoji:"🐈"},{id:"self-care-012",category:"self-care",title:"",message:"You're allowed to change your mind, cancel the plan, and protect your peace.",emoji:"🕊️"},{id:"self-care-013",category:"self-care",title:"",message:"Have you stepped outside today, even for a minute? Fresh air is a tiny free miracle.",emoji:"🌳"},{id:"self-care-014",category:"self-care",title:"",message:"Lower the brightness, soften the lights. Your eyes and your nervous system will thank you.",emoji:"🔅"},{id:"self-care-015",category:"self-care",title:"",message:"That voice being mean to you in your head? It's lying. Don't believe everything you think.",emoji:"🧠"},{id:"self-care-016",category:"self-care",title:"",message:"Wash your face or brush your teeth. Small resets can shift a whole mood. Esha, you deserve to feel fresh.",emoji:"🪥"},{id:"self-care-017",category:"self-care",title:"",message:"You are doing your best with what today gave you. That has always been enough.",emoji:"🌟"},{id:"self-care-018",category:"self-care",title:"",message:"Put your phone down for ten minutes and just... be. The scroll will survive without you.",emoji:"📲"},{id:"self-care-019",category:"self-care",title:"",message:"Feelings are visitors, not residents. This heavy one will move along too. Let it pass through.",emoji:"🌦️"},{id:"self-care-020",category:"self-care",title:"",message:"Have you been holding your breath while you concentrate? Exhale. Let your body soften.",emoji:"🌬️"},{id:"self-care-021",category:"self-care",title:"",message:"It's okay to ask for help. Needing people isn't weakness — it's just being human.",emoji:"🤝"},{id:"self-care-022",category:"self-care",title:"",message:"Light a candle, make a tea, lower the noise. Build yourself a tiny pocket of calm.",emoji:"🕯️"},{id:"self-care-023",category:"self-care",title:"",message:"You don't owe anyone an explanation for resting. Close the laptop. Lie down. I mean it.",emoji:"💻"},{id:"self-care-024",category:"self-care",title:"",message:"Be as kind to yourself as you'd be to me on my worst day. You deserve that same softness.",emoji:"🫂"},{id:"self-care-025",category:"self-care",title:"",message:"Did you move your body a little today? Even a slow stretch or a short walk counts plenty.",emoji:"🚶"},{id:"self-care-026",category:"self-care",title:"",message:"Whatever you couldn't finish today will still be there tomorrow. Tomorrow-you can handle it. Tonight, rest.",emoji:"🌙"},{id:"self-care-027",category:"self-care",title:"",message:"You're allowed to feel proud of small things. Out of bed counts. Showered counts. Trying counts.",emoji:"🏅"},{id:"self-care-028",category:"self-care",title:"",message:"This is your reminder that you are loved, you are safe, and you are allowed to slow down, Esha.",emoji:"💗"},{id:"adhd-001",category:"adhd",title:"",message:"If a task feels huge, it's not laziness — it's just a big task. Shrink it. The first tiny step is enough.",emoji:"🧩"},{id:"adhd-002",category:"adhd",title:"",message:"You don't have a willpower problem. Your brain is just wired for interest, not pressure. Work with it, not against it.",emoji:"🧠"},{id:"adhd-003",category:"adhd",title:"",message:"Forgot something again? You're not broken. Your wonderful brain is just running a lot of tabs at once.",emoji:"🗂️"},{id:"adhd-004",category:"adhd",title:"",message:"Body doubling works: do the boring thing 'next to' someone. I'm happy to be your someone anytime.",emoji:"👯"},{id:"adhd-005",category:"adhd",title:"",message:"Done is genuinely better than perfect. A messy finished thing beats a flawless imaginary one.",emoji:"✅"},{id:"adhd-006",category:"adhd",title:"",message:"If you started five things and finished none today, you still moved five things forward. That's real progress.",emoji:"🌀"},{id:"adhd-007",category:"adhd",title:"",message:"Set a two-minute timer. You can stop after. (You probably won't want to, but you can.)",emoji:"⏱️"},{id:"adhd-008",category:"adhd",title:"",message:"Object permanence is fake to your brain, so it's okay to leave the snacks where you can see them. Survival.",emoji:"🍿"},{id:"adhd-009",category:"adhd",title:"",message:"Your hyperfocus is a superpower, not a flaw. The trick is pointing it somewhere kind to you.",emoji:"🔦"},{id:"adhd-010",category:"adhd",title:"",message:"Missed a deadline or a text? Repair, don't spiral. One honest 'sorry, my brain ran off' fixes most things.",emoji:"💬"},{id:"adhd-011",category:"adhd",title:"",message:"Make the boring task weird, loud, gamified, or musical. Whatever gets your brain to say 'oh, fun'.",emoji:"🎮"},{id:"adhd-012",category:"adhd",title:"",message:"You are not behind in life. There's no universal schedule. Your timeline is allowed to look like yours.",emoji:"🗺️"},{id:"adhd-013",category:"adhd",title:"",message:"Write it down the second you think it. Your memory isn't unreliable — it's just busy being brilliant.",emoji:"📝"},{id:"adhd-014",category:"adhd",title:"",message:"Rest before you're empty, not after you crash. Your brain spends energy fast — refuel often, Esha.",emoji:"🔋"},{id:"adhd-015",category:"adhd",title:"",message:"The 'simple' things being hard for you doesn't make you less. Different fuel, same destination.",emoji:"⛽"},{id:"adhd-016",category:"adhd",title:"",message:"Transitions are tough. It's okay if 'just start' takes you twenty minutes. Starting still counts as starting.",emoji:"🚦"},{id:"adhd-017",category:"adhd",title:"",message:"You don't need to mask for me. Stim, fidget, info-dump, go quiet. All of it is welcome here.",emoji:"🤍"},{id:"adhd-018",category:"adhd",title:"",message:"One open loop is fine. You don't have to close every tab today. Some can wait until tomorrow-you.",emoji:"🔁"},{id:"adhd-019",category:"adhd",title:"",message:"Celebrate the random win — you replied to the email! You found your keys! Genuinely, well done.",emoji:"🎉"},{id:"adhd-020",category:"adhd",title:"",message:"Your brain craves novelty, so change the scenery when you're stuck. A new room can restart a whole task.",emoji:"🪑"},{id:"adhd-021",category:"adhd",title:"",message:"If you forgot to eat because you were locked in, no shame — go grab something now. Refuel the engine.",emoji:"🍞"},{id:"adhd-022",category:"adhd",title:"",message:"The mess on your desk isn't a moral failing. It's just where a busy, creative mind has been living.",emoji:"🗃️"},{id:"adhd-023",category:"adhd",title:"",message:"Externalise everything: alarms, sticky notes, lists, me reminding you. That's clever, not cheating.",emoji:"⏰"},{id:"adhd-024",category:"adhd",title:"",message:"You feel things at full volume — joy, excitement, overwhelm. That depth is a gift, even when it's a lot.",emoji:"🔊"},{id:"adhd-025",category:"adhd",title:"",message:"'I'll do it later' brain is real. So break the spell: do the two-minute version of it right now.",emoji:"✨"},{id:"adhd-026",category:"adhd",title:"",message:"You are not too much. You are a lot of wonderful, and the right people will never ask you to be less.",emoji:"💗"},{id:"adhd-027",category:"adhd",title:"",message:"Some days executive function just doesn't show up for work. That's not your fault. Be gentle with yourself, Esha.",emoji:"🌦️"},{id:"adhd-028",category:"adhd",title:"",message:"Your brain is not a problem to be fixed. It's a different, beautiful operating system, and I adore it.",emoji:"🧠"},{id:"date-idea-001",category:"date-idea",title:"Sunrise mission",message:"Let's wake up far too early one day, grab warm drinks, and watch the sun come up like it's just for us.",emoji:"🌅"},{id:"date-idea-002",category:"date-idea",title:"Bookshop hours",message:"A whole afternoon in a bookshop, picking out a book for each other to read. No time limit. No agenda.",emoji:"📚"},{id:"date-idea-003",category:"date-idea",title:"Cook something new",message:"Let's attempt a recipe neither of us has tried, make a mess, and call whatever comes out 'rustic'.",emoji:"🍳"},{id:"date-idea-004",category:"date-idea",title:"Stargazing for real",message:"Drive somewhere dark, lie on a blanket, and actually find the constellations this time. Or invent ours.",emoji:"🌌"},{id:"date-idea-005",category:"date-idea",title:"Rainy day museum",message:"Pick a rainy day, wander a museum slowly, and make up dramatic backstories for every painting.",emoji:"🖼️"},{id:"date-idea-006",category:"date-idea",title:"Picnic anywhere",message:"Throw together a picnic and eat it somewhere slightly ridiculous, just to make it a story.",emoji:"🧺"},{id:"date-idea-007",category:"date-idea",title:"Old films night",message:"A double bill of films older than both of us, with snacks and zero phones. Vintage and cosy.",emoji:"🎞️"},{id:"date-idea-008",category:"date-idea",title:"Aquarium drift",message:"Let's stand in front of the jellyfish tank for way too long and go quiet together. Underrated date.",emoji:"🪼"},{id:"date-idea-009",category:"date-idea",title:"Market morning",message:"Wander a market with no shopping list, taste everything, and buy one totally impractical thing.",emoji:"🍓"},{id:"date-idea-010",category:"date-idea",title:"Plant a thing",message:"Let's get a little plant we have to keep alive together. A low-stakes way to grow something with you.",emoji:"🪴"},{id:"date-idea-011",category:"date-idea",title:"Drive nowhere",message:"Pick a direction, drive with a good playlist, and turn around whenever it feels right. The point is the going.",emoji:"🚗"},{id:"date-idea-012",category:"date-idea",title:"Paint badly",message:"A paint-and-sip night where we're both objectively terrible and proudly hang the results anyway.",emoji:"🎨"},{id:"date-idea-013",category:"date-idea",title:"Hot drinks, cold walk",message:"Bundle up, get the warmest drinks we can find, and take a slow cold-weather walk hand in hand.",emoji:"☕"},{id:"date-idea-014",category:"date-idea",title:"Breakfast for dinner",message:"Pancakes at 8pm. Pajamas mandatory. A small, perfect rebellion against the rules of meals.",emoji:"🥞"},{id:"date-idea-015",category:"date-idea",title:"Thrift adventure",message:"Thrift store challenge: find each other the most 'us' item under a tiny budget. Winner gets bragging rights.",emoji:"🧥"},{id:"date-idea-016",category:"date-idea",title:"Build a fort",message:"A grown-up blanket fort with fairy lights, snacks, and a strict no-responsibilities policy inside.",emoji:"🏕️"},{id:"date-idea-017",category:"date-idea",title:"Karaoke chaos",message:"Karaoke night where we commit fully to songs we cannot sing. Dignity optional, joy guaranteed.",emoji:"🎤"},{id:"date-idea-018",category:"date-idea",title:"Lazy garden day",message:"A whole day with nowhere to be — just a garden, a blanket, snacks, and the luxury of doing nothing.",emoji:"🌿"},{id:"date-idea-019",category:"date-idea",title:"Mini road trip",message:"Pick a random nearby town we've never been to and spend a day pretending we're tourists there.",emoji:"🗺️"},{id:"date-idea-020",category:"date-idea",title:"Game night",message:"Board games and snacks and me letting you win, except I never let you win and you always do anyway.",emoji:"🎲"},{id:"date-idea-021",category:"date-idea",title:"Sunset chasing",message:"Find the best spot to watch the sky go orange and pink, and stay until the first stars show up.",emoji:"🌇"},{id:"date-idea-022",category:"date-idea",title:"Cosy café crawl",message:"A slow café crawl — one warm drink, one cosy corner, one long conversation per stop. No rushing.",emoji:"🍰"},{id:"date-idea-023",category:"date-idea",title:"Learn together",message:"Let's pick something silly to learn together — juggling, a card trick, ten words of a new language.",emoji:"🤹"},{id:"date-idea-024",category:"date-idea",title:"Beach in any weather",message:"The beach when it's moody and grey, scarves on, no crowds, just the waves and us. My favourite kind.",emoji:"🌊"},{id:"date-idea-025",category:"date-idea",title:"Movie marathon day",message:"Clear an entire day, stack the pillows, ration the snacks, and disappear into a whole film series.",emoji:"🍿"},{id:"date-idea-026",category:"date-idea",title:"Stroll and snack",message:"Walk somewhere pretty, follow every good food smell, and let our stomachs plan the whole route.",emoji:"🥐"},{id:"date-idea-027",category:"date-idea",title:"Late-night drive home",message:"End any date with a quiet late-night drive, your hand in mine, both of us not quite ready for it to end.",emoji:"🌙"},{id:"date-idea-028",category:"date-idea",title:"One day, everything",message:"Honestly, Esha, the dream date is just a whole day of you with nowhere either of us has to be. I'd take that over anything.",emoji:"💫"},{id:"bedtime-001",category:"bedtime",title:"",message:"The day is done and you made it through. Let your shoulders drop. You're safe now.",emoji:"🌙"},{id:"bedtime-002",category:"bedtime",title:"",message:"Whatever's left undone can wait for morning. Right now, your only job is to rest.",emoji:"😴"},{id:"bedtime-003",category:"bedtime",title:"",message:"Goodnight, Esha. I hope your dreams are as soft and lovely as you are.",emoji:"💤"},{id:"bedtime-004",category:"bedtime",title:"",message:"Put the day down. You don't have to solve it tonight. Tomorrow-you gets a fresh start.",emoji:"🛌"},{id:"bedtime-005",category:"bedtime",title:"",message:"If your mind is loud, let it be loud somewhere else. In here, it's just you and rest.",emoji:"🌌"},{id:"bedtime-006",category:"bedtime",title:"",message:"You are allowed to stop now. The world will still be turning when you wake up.",emoji:"🌠"},{id:"bedtime-007",category:"bedtime",title:"",message:"Tuck yourself in like someone deeply loved — because you are. Sleep well, my heart.",emoji:"🤍"},{id:"bedtime-008",category:"bedtime",title:"",message:"Breathe out the whole day. In with calm, out with everything that doesn't get to follow you to sleep.",emoji:"🌬️"},{id:"bedtime-009",category:"bedtime",title:"",message:"I hope the last thought you have tonight is a soft one. Here's one: you are so loved.",emoji:"💗"},{id:"bedtime-010",category:"bedtime",title:"",message:"No more scrolling, no more worrying. Close your eyes. Let the quiet hold you.",emoji:"📴"},{id:"bedtime-011",category:"bedtime",title:"",message:"You survived today, and that's enough. No gold stars required. Just rest now.",emoji:"⭐"},{id:"bedtime-012",category:"bedtime",title:"",message:"Imagine I'm pulling the blanket up around you and turning off the light. There. All cosy.",emoji:"🕯️"},{id:"bedtime-013",category:"bedtime",title:"",message:"Tomorrow is a clean page. Tonight, you get to be soft, still, and completely off-duty.",emoji:"📖"},{id:"bedtime-014",category:"bedtime",title:"",message:"If today was heavy, set it by the door. It'll still be there if you want it tomorrow. You probably won't.",emoji:"🚪"},{id:"bedtime-015",category:"bedtime",title:"",message:"Sweet dreams, Esha. May you sleep deep and wake up feeling a little lighter.",emoji:"🌜"},{id:"bedtime-016",category:"bedtime",title:"",message:"Your body did so much today just to keep you here. Thank it with a long, good sleep.",emoji:"🫀"},{id:"bedtime-017",category:"bedtime",title:"",message:"Let the day's worries go quiet. They've talked enough. It's rest's turn now.",emoji:"🤫"},{id:"bedtime-018",category:"bedtime",title:"",message:"You don't have to earn sleep by finishing everything. You just have to let yourself have it.",emoji:"🛏️"},{id:"bedtime-019",category:"bedtime",title:"",message:"Picture somewhere calm — a quiet shore, a warm room — and let your mind walk there slowly.",emoji:"🏝️"},{id:"bedtime-020",category:"bedtime",title:"",message:"Goodnight. You were brave today in ways no one saw. I saw. Now rest, you've earned it.",emoji:"🛡️"},{id:"bedtime-021",category:"bedtime",title:"",message:"One slow breath. Then another. Let each one carry you a little further from today.",emoji:"😮‍💨"},{id:"bedtime-022",category:"bedtime",title:"",message:"The stars are out and they've got the night shift covered. You're free to close your eyes.",emoji:"✨"},{id:"bedtime-023",category:"bedtime",title:"",message:"However the day went, it's over now, and you're still here, still loved, still enough.",emoji:"🌃"},{id:"bedtime-024",category:"bedtime",title:"",message:"Warm blanket, soft pillow, quiet mind. I'm wishing all three for you tonight, Esha.",emoji:"🧸"},{id:"bedtime-025",category:"bedtime",title:"",message:"Rest is not the opposite of progress. Sometimes it IS the progress. Goodnight, you brilliant thing.",emoji:"🌱"},{id:"bedtime-026",category:"bedtime",title:"",message:"Let your thoughts get slow and blurry. You don't have to follow them anywhere tonight.",emoji:"🌫️"},{id:"bedtime-027",category:"bedtime",title:"",message:"If you can't sleep yet, that's okay too. Just lie still and let your body rest. That counts.",emoji:"🌙"},{id:"bedtime-028",category:"bedtime",title:"",message:"Last thing before you drift off: you are safe, you are loved, and you made it through. Goodnight.",emoji:"💫"},{id:"good-morning-001",category:"good-morning",title:"",message:"Good morning, Esha. The world is a little better today simply because you're awake in it.",emoji:"🌞"},{id:"good-morning-002",category:"good-morning",title:"",message:"Rise and shine, you. No pressure to be amazing today — just be here, that's plenty.",emoji:"☀️"},{id:"good-morning-003",category:"good-morning",title:"",message:"New day, clean page. Whatever yesterday was, this morning doesn't have to carry it.",emoji:"📄"},{id:"good-morning-004",category:"good-morning",title:"",message:"Stretch big, drink some water, and remember someone's thinking about you already. (It's me.)",emoji:"💧"},{id:"good-morning-005",category:"good-morning",title:"",message:"Good morning! Take this as your sign that today has good things tucked into it somewhere.",emoji:"🎁"},{id:"good-morning-006",category:"good-morning",title:"",message:"Hope you slept okay. Even if you didn't, you're up now, and that's a brave little victory.",emoji:"🌅"},{id:"good-morning-007",category:"good-morning",title:"",message:"Morning, sweet Esha. Go easy on yourself today. You don't have to win, just to begin.",emoji:"🌸"},{id:"good-morning-008",category:"good-morning",title:"",message:"The sun came up and so did you. Both of those are quietly miraculous, honestly.",emoji:"🌄"},{id:"good-morning-009",category:"good-morning",title:"",message:"Good morning. Today's goal: one small good thing and a little kindness toward yourself.",emoji:"🫶"},{id:"good-morning-010",category:"good-morning",title:"",message:"Wherever you are right now, I hope your coffee's warm and your morning's gentle.",emoji:"☕"},{id:"good-morning-011",category:"good-morning",title:"",message:"A brand new day just for you. No edits, no leftovers. Make it as soft or as bold as you like.",emoji:"🌈"},{id:"good-morning-012",category:"good-morning",title:"",message:"Morning! Whatever today holds, you've got a 100% record of surviving your hardest days so far.",emoji:"🏅"},{id:"good-morning-013",category:"good-morning",title:"",message:"Good morning, you. Before the day gets loud, here's one quiet thing: you are so loved.",emoji:"💗"},{id:"good-morning-014",category:"good-morning",title:"",message:"Eyes open, blanket warm, world waiting. Take your time. The day can start at your pace.",emoji:"🛌"},{id:"good-morning-015",category:"good-morning",title:"",message:"Rise slowly if you need to. Not every morning has to be a sprint. Some are gentle on purpose.",emoji:"🐢"},{id:"good-morning-016",category:"good-morning",title:"",message:"Good morning! Sending you enough energy for the first task and a little extra for the rest.",emoji:"🔋"},{id:"good-morning-017",category:"good-morning",title:"",message:"Today is yours. You don't owe it perfection — just show up, and let that be enough.",emoji:"🌟"},{id:"good-morning-018",category:"good-morning",title:"",message:"Morning, Esha. Here's hoping for small wins, kind faces, and at least one really good snack.",emoji:"🥐"},{id:"good-morning-019",category:"good-morning",title:"",message:"The day's begun and you're already doing great by simply choosing to start it. Proud of you.",emoji:"✨"},{id:"good-morning-020",category:"good-morning",title:"",message:"Good morning! Picture me handing you a warm drink and telling you you've got this. Because you do.",emoji:"🍵"},{id:"good-morning-021",category:"good-morning",title:"",message:"Whatever's on your list today, remember: you are a person first and a to-do list never.",emoji:"📝"},{id:"good-morning-022",category:"good-morning",title:"",message:"Soft start, steady heart. Take the morning slow and let the rest of the day find its rhythm.",emoji:"🎐"},{id:"good-morning-023",category:"good-morning",title:"",message:"Morning! If today feels like a mountain, just look at the next step, not the whole climb.",emoji:"⛰️"},{id:"good-morning-024",category:"good-morning",title:"",message:"Good morning, beautiful brain. Let's keep things gentle and doable today. One thing at a time.",emoji:"🧠"},{id:"good-morning-025",category:"good-morning",title:"",message:"The early light is on your side today. So am I. Go be wonderfully, ordinarily you.",emoji:"🌤️"},{id:"good-morning-026",category:"good-morning",title:"",message:"Hello, new day. Hello, lovely Esha. May this one be a little kinder than it has any right to be.",emoji:"🌻"},{id:"good-morning-027",category:"good-morning",title:"",message:"Good morning! No need to have it all figured out yet. Just have your breakfast. Start there.",emoji:"🍳"},{id:"good-morning-028",category:"good-morning",title:"",message:"You woke up, and that's the bravest first step. Everything after this is just bonus. Morning, you.",emoji:"💫"},{id:"coupon-001",category:"coupon",title:"Forehead kiss",message:"Redeemable for one (1) free forehead kiss, no expiry, unlimited reuse.",emoji:"🎟️",button:{label:"Redeem kiss",reveal:"Consider it planted. 😚 Saved for the next time I see you."}},{id:"coupon-002",category:"coupon",title:"Long hug",message:"This coupon entitles the holder to one extra-long hug, the kind where neither person lets go first.",emoji:"🎫",button:{label:"Redeem hug",reveal:"Squeezing you the second I can. 🤗 Hold tight."}},{id:"coupon-003",category:"coupon",title:"Breakfast in bed",message:"Good for one breakfast in bed, chef's choice, served with zero judgement about the hour.",emoji:"🥞",button:{label:"Redeem breakfast",reveal:"Order received. Pancakes are non-negotiable. 🥞"}},{id:"coupon-004",category:"coupon",title:"Get out of chores",message:"One free pass to skip a chore and hand it to me instead. Use it shamelessly, Esha.",emoji:"🧹",button:{label:"Redeem pass",reveal:"Consider it handled. Go rest. 🛋️"}},{id:"coupon-005",category:"coupon",title:"Pick the movie",message:"Holder gets full, unquestioned control of movie night. My opinions are hereby forfeited.",emoji:"🍿",button:{label:"Redeem control",reveal:"The remote is yours. I surrender completely. 📺"}},{id:"coupon-006",category:"coupon",title:"One rant, no fixing",message:"Redeem for one full rant where I just listen and agree — no advice, no 'have you tried', promise.",emoji:"🗣️",button:{label:"Redeem rant",reveal:"I'm all ears and zero solutions. Go for it. 👂"}},{id:"coupon-007",category:"coupon",title:"Snack delivery",message:"This entitles you to one snack of your choosing, delivered to wherever you are slumped.",emoji:"🍫",button:{label:"Redeem snack",reveal:"Name it and it's yours. The kitchen is open. 🍪"}},{id:"coupon-008",category:"coupon",title:"A do-over",message:"One free do-over for a moment, a bad day, or a sentence that came out wrong. Slate wiped clean.",emoji:"🔄",button:{label:"Redeem do-over",reveal:"Erased. We start fresh, no scoreboard. 🤍"}},{id:"coupon-009",category:"coupon",title:"Lazy Sunday",message:"Good for one entire lazy Sunday together with no plans, no alarms, and no productivity allowed.",emoji:"🛌",button:{label:"Redeem Sunday",reveal:"Booked. Doing absolutely nothing, together. 😌"}},{id:"coupon-010",category:"coupon",title:"Compliment on demand",message:"Holder may redeem one sincere, custom compliment any time their day needs a lift.",emoji:"💬",button:{label:"Redeem compliment",reveal:"You're handling things better than you think, and you look great doing it. 🌟"}},{id:"coupon-011",category:"coupon",title:"Reheat my coffee",message:"One coupon for me to reheat your forgotten drink for the fourth time, lovingly and without comment.",emoji:"☕",button:{label:"Redeem reheat",reveal:"On it. Warm drink incoming, no teasing. ☕"}},{id:"coupon-012",category:"coupon",title:"Pick the food",message:"Redeem for full authority over what we eat. No 'I don't mind' from me. Your craving wins.",emoji:"🍜",button:{label:"Redeem food",reveal:"Your craving is the law. Where are we ordering from? 🥡"}},{id:"coupon-013",category:"coupon",title:"Five more minutes",message:"Good for five more minutes of cuddles before either of us has to be a responsible adult.",emoji:"⏱️",button:{label:"Redeem minutes",reveal:"Timer paused. Stay right here. 🫂"}},{id:"coupon-014",category:"coupon",title:"A pep talk",message:"Redeem when you need someone in your corner reminding you exactly how capable you are.",emoji:"📣",button:{label:"Redeem pep talk",reveal:"You've survived 100% of your worst days. You've got this one too. 💪"}},{id:"coupon-015",category:"coupon",title:"No-reason gift",message:"This coupon is good for one small surprise, given for absolutely no occasion at all.",emoji:"🎁",button:{label:"Redeem surprise",reveal:"Already plotting something little. 🤫"}},{id:"coupon-016",category:"coupon",title:"Hand holding",message:"Unlimited hand-holding privileges, valid in public, in private, and especially when you're nervous.",emoji:"🤝",button:{label:"Redeem hand",reveal:"My hand is yours on demand. 🫶"}},{id:"coupon-017",category:"coupon",title:"Cancel the plan",message:"One free 'actually, let's stay in' card. Redeemable when the world feels like a bit much.",emoji:"🏠",button:{label:"Redeem cancel",reveal:"Plans cancelled. Pajamas on. We're staying in. 🛋️"}},{id:"coupon-018",category:"coupon",title:"Carry the heavy thing",message:"Redeem and I'll carry the heavy thing — the bag, the worry, the hard conversation. Whatever it is.",emoji:"🎒",button:{label:"Redeem help",reveal:"Hand it over. You don't carry that one alone. 🤍"}},{id:"coupon-019",category:"coupon",title:"A slow dance",message:"Good for one slow dance in the kitchen to whatever song is playing, even if it's an advert jingle.",emoji:"💃",button:{label:"Redeem dance",reveal:"Take my hand. We dance in ten seconds. 🎶"}},{id:"coupon-020",category:"coupon",title:"Undivided attention",message:"Redeem for thirty minutes of my full, phone-away, fully-present attention. Esha, you always have it anyway.",emoji:"👀",button:{label:"Redeem attention",reveal:"Phone's away. It's just you and me. Talk to me. 💛"}},{id:"coupon-021",category:"coupon",title:"A warm bath run",message:"One coupon to have a warm bath drawn for you, candles optional, peace mandatory.",emoji:"🛁",button:{label:"Redeem bath",reveal:"Running it now. Go soak the day off. 🕯️"}},{id:"coupon-022",category:"coupon",title:"Win the argument",message:"Redeemable for being declared 'right' in one (1) low-stakes disagreement, no questions asked.",emoji:"🏆",button:{label:"Redeem win",reveal:"Fine, fine — you're right. You're usually right anyway. 😌"}},{id:"coupon-023",category:"coupon",title:"Surprise playlist",message:"Good for one playlist made entirely of songs that remind me of you. Warning: it may be very long.",emoji:"🎧",button:{label:"Redeem playlist",reveal:"Building it as we speak. Hope you like feelings. 🎵"}},{id:"coupon-024",category:"coupon",title:"A real check-in",message:"Redeem any time for a proper 'no, how are you actually doing?' with all the time in the world to answer.",emoji:"💗",button:{label:"Redeem check-in",reveal:"So — how are you really? I've got all night. 🫶"}},{id:"coupon-025",category:"coupon",title:"Take the day off",message:"One permission slip to do absolutely nothing today, signed and approved with love.",emoji:"📝",button:{label:"Redeem day off",reveal:"Approved. Rest is the assignment today. 🌿"}},{id:"coupon-026",category:"coupon",title:"Cosy night in",message:"Redeem for one perfectly engineered cosy night — blankets, snacks, dim lights, your favourite person.",emoji:"🕯️",button:{label:"Redeem cosy",reveal:"Setting the scene. Blankets deployed. 🛋️"}},{id:"coupon-027",category:"coupon",title:"A long voice note",message:"Good for one rambling voice note from me about nothing in particular, just so you hear my voice.",emoji:"🎙️",button:{label:"Redeem voice note",reveal:"Recording something silly for you now. 🎤"}},{id:"coupon-028",category:"coupon",title:"Anything you need",message:"The ultimate coupon, Esha: redeemable for whatever you need most right now. Just tell me. I'm in.",emoji:"✨",button:{label:"Redeem anything",reveal:"Whatever it is — I'm already saying yes. 💛"}},{id:"kiss-001",category:"kiss",title:"",message:"Mwah! One forehead kiss, delivered straight to wherever you're sitting right now.",emoji:"😚"},{id:"kiss-002",category:"kiss",title:"",message:"Sending a kiss to the tip of your nose. Yes, the exact spot that makes you scrunch up.",emoji:"👃"},{id:"kiss-003",category:"kiss",title:"",message:"Consider this a kiss on the back of your hand, very old-fashioned, very 'I adore you'.",emoji:"💋"},{id:"kiss-004",category:"kiss",title:"",message:"A slow kiss on the cheek for no reason other than you crossed my mind. Again. As usual.",emoji:"😘"},{id:"kiss-005",category:"kiss",title:"",message:"Here's a kiss for your shoulder, the kind that comes with arms wrapped around you from behind.",emoji:"🤍"},{id:"kiss-006",category:"kiss",title:"",message:"One sleepy goodnight kiss, the soft kind, right on your temple. Sweet dreams, Esha.",emoji:"🌙"},{id:"kiss-007",category:"kiss",title:"",message:"Catching your face in both hands and kissing your forehead. There. Now the day's better.",emoji:"🫶"},{id:"kiss-008",category:"kiss",title:"",message:"A surprise kiss mid-sentence, just to watch you forget what you were saying. Worth it.",emoji:"😳"},{id:"kiss-009",category:"kiss",title:"",message:"Sending a kiss to land on your knuckles while we're holding hands. Subtle. On purpose.",emoji:"🤝"},{id:"kiss-010",category:"kiss",title:"",message:"One 'you're being too hard on yourself' kiss, pressed gently to the top of your head.",emoji:"👑"},{id:"kiss-011",category:"kiss",title:"",message:"A good-morning kiss before you're even properly awake. Mumble at me, I'll kiss you again.",emoji:"🌞"},{id:"kiss-012",category:"kiss",title:"",message:"Blowing you a kiss across however many miles are between us right now. Catch it, Esha.",emoji:"💨"},{id:"kiss-013",category:"kiss",title:"",message:"A kiss for that little worried crease between your eyebrows. Let me smooth it away.",emoji:"😌"},{id:"kiss-014",category:"kiss",title:"",message:"One celebratory kiss for a thing you did today, big or small. I'm proud of you. Smooch.",emoji:"🎉"},{id:"kiss-015",category:"kiss",title:"",message:"Sending a kiss to your cheek that lingers a second too long, the way I always do.",emoji:"😚"},{id:"kiss-016",category:"kiss",title:"",message:"A quiet kiss on the wrist, right where your pulse is, just to feel how alive you are.",emoji:"💗"},{id:"kiss-017",category:"kiss",title:"",message:"Here's a kiss to steal your breath for half a second and put a daft grin on your face.",emoji:"😄"},{id:"kiss-018",category:"kiss",title:"",message:"One 'I missed you more than I'll admit' kiss, saved up and sent all at once. Mwah.",emoji:"💞"},{id:"kiss-019",category:"kiss",title:"",message:"A kiss on your hairline while you're not looking, soft enough that you almost miss it.",emoji:"🥰"},{id:"kiss-020",category:"kiss",title:"",message:"Sending the kind of slow, unhurried kiss reserved for lazy mornings with nowhere to be.",emoji:"☀️"},{id:"kiss-021",category:"kiss",title:"",message:"A playful kiss on the cheek that turns into me grinning at you like an idiot. Standard.",emoji:"😁"},{id:"kiss-022",category:"kiss",title:"",message:"One reassuring kiss to the forehead that says 'whatever it is, we'll handle it'. We will.",emoji:"🤲"},{id:"kiss-023",category:"kiss",title:"",message:"Pressing a kiss to your shoulder and resting my chin there. Comfiest spot I know.",emoji:"🫂"},{id:"kiss-024",category:"kiss",title:"",message:"A kiss sent specifically to chase away a bad mood. Direct hit, hopefully. Feel better, Esha.",emoji:"🎯"},{id:"kiss-025",category:"kiss",title:"",message:"Here's a tiny kiss for each freckle, which means I'll be here a very pleasant while.",emoji:"✨"},{id:"kiss-026",category:"kiss",title:"",message:"One stolen kiss at a red light, the classic, the timeless. Green now. Worth being late.",emoji:"🚦"},{id:"kiss-027",category:"kiss",title:"",message:"A goodnight kiss so soft you'll wonder if you dreamt it. You didn't. I meant it.",emoji:"💤"},{id:"kiss-028",category:"kiss",title:"",message:"Sending you the most ridiculous, exaggerated, cartoon 'MWAH' just to make you laugh. 💋💋💋",emoji:"😘"},{id:"hug-001",category:"hug",title:"",message:"Wrapping you in the biggest hug right now. The kind that lifts you off the floor a little.",emoji:"🤗"},{id:"hug-002",category:"hug",title:"",message:"Here's a hug from behind, arms around your middle, chin on your shoulder. Stay a while.",emoji:"🫂"},{id:"hug-003",category:"hug",title:"",message:"Sending a hug strong enough to squeeze the stress right out of you. Exhale into it, Esha.",emoji:"💪"},{id:"hug-004",category:"hug",title:"",message:"One slow, no-rush hug where neither of us is the first to let go. Take all the time you need.",emoji:"🤍"},{id:"hug-005",category:"hug",title:"",message:"A hug for whatever today threw at you. Drop the weight. I've got it from here.",emoji:"🎒"},{id:"hug-006",category:"hug",title:"",message:"Imagine being pulled into a warm hug the second you walk in the door. That's waiting for you.",emoji:"🚪"},{id:"hug-007",category:"hug",title:"",message:"Here's a hug that says nothing and means everything. Sometimes that's the only language that fits.",emoji:"🤲"},{id:"hug-008",category:"hug",title:"",message:"Sending the kind of hug that makes the rest of the world go quiet for a minute. Just breathe.",emoji:"🤫"},{id:"hug-009",category:"hug",title:"",message:"A bear hug, full strength, slightly too much, exactly right. Consider yourself thoroughly squished.",emoji:"🐻"},{id:"hug-010",category:"hug",title:"",message:"One gentle hug for the soft, tired parts of you that don't always get held. They're held now.",emoji:"🫶"},{id:"hug-011",category:"hug",title:"",message:"Wrapping a blanket and my arms around you at the same time. Maximum cosy protocol engaged.",emoji:"🧣"},{id:"hug-012",category:"hug",title:"",message:"Here's a hug to remind your body it's safe now. Shoulders down. You can stop bracing.",emoji:"😮‍💨"},{id:"hug-013",category:"hug",title:"",message:"Sending a hug across all the distance between us. Close your eyes and you might feel it, Esha.",emoji:"🌍"},{id:"hug-014",category:"hug",title:"",message:"A hug that lasts ten full seconds, scientifically the good kind, the kind that resets you.",emoji:"⏱️"},{id:"hug-015",category:"hug",title:"",message:"One 'I'm proud of you and I'm not letting go yet' hug, held a little longer than usual.",emoji:"🏅"},{id:"hug-016",category:"hug",title:"",message:"Pulling you into my chest so you can hear that everything's okay in there. Steady heartbeat, just for you.",emoji:"🫀"},{id:"hug-017",category:"hug",title:"",message:"Here's a hug for the version of you that's been holding everyone else up. Lean on me now.",emoji:"🛟"},{id:"hug-018",category:"hug",title:"",message:"Sending a hug warm enough to thaw the coldest, longest day. Come here, you. You made it.",emoji:"🔥"},{id:"hug-019",category:"hug",title:"",message:"A side-hug while we walk, hip to hip, perfectly out of step and not caring even slightly.",emoji:"🚶"},{id:"hug-020",category:"hug",title:"",message:"One hug saved up f
